name: build

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
      - 'snapshot-*'
  pull_request:
    branches:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - run: python -m pip install meson ninja
      - run: meson -Dbuildtype=release -Dstatic=prebuilt -Dignore_updates=false -Dinstall_check=true build
      - id: get_type # the meson invocation above is needed for this step to figure out the name of the release
        run: python ./.github/get-type.py ${{ github.ref }}
      - id: create_release
        if: steps.get_type.outputs.type != 'dev'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ steps.get_type.outputs.name }}
          draft: true
          prerelease: false
      - run: echo "${{ steps.create_release.outputs.upload_url }}" "${{ steps.get_type.outputs.type }}" "${{ steps.get_type.outputs.name }}" > release_info.txt
      - uses: actions/upload-artifact@v2
        with:
          name: release_info
          path: release_info.txt
  build:
    runs-on: ${{ matrix.os }}
    needs: [release]
    strategy:
      matrix:
        platform_short: [lin, mac, win]
        build_system: [meson, vsppy]
        exclude:
          - platform_short: lin
            build_system: vsppy
          - platform_short: mac
            build_system: vsppy
        include:
          - platform_short: lin
            os: ubuntu-latest
          - platform_short: mac
            os: macos-latest
          - platform_short: win
            os: windows-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/download-artifact@v2
        with:
          name: release_info
      - id: get_release_info
        run: bash -c "./.github/get-release-info.sh" # gg github, this is terrible
      - if: matrix.os == 'macos-latest'
        run: brew install pkg-config
      - uses: actions/setup-python@v2
      - run: python -m pip install meson ninja
      - run: bash -c 'PLATFORM_SHORT=${{ matrix.platform_short }} BUILD_SYSTEM=${{ matrix.build_system }} RELEASE_TYPE=${{ steps.get_release_info.outputs.type }} ./.github/build.sh'
      - uses: actions/upload-release-asset@v1
        if: ${{ !( steps.get_release_info.outputs.type == 'dev' || matrix.build_system == 'vsppy') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.get_release_info.outputs.upload_url }}
          asset_path: powder.zip
          asset_name: powder-${{ steps.get_release_info.outputs.name }}-${{ matrix.build_system }}-${{ matrix.platform_short }}64.zip
          asset_content_type: application/zip
      - uses: actions/upload-artifact@v2
        if: ${{ steps.get_release_info.outputs.type == 'dev' || matrix.build_system == 'vsppy' }}
        with:
          path: powder.zip
          name: powder-${{ steps.get_release_info.outputs.name }}-${{ matrix.build_system }}-${{ matrix.platform_short }}64.zip
